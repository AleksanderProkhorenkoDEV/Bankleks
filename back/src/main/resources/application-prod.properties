spring.datasource.url=jdbc:mysql://${DB_URL}/${DB_SCHEMA}?useSSL=true&requireSSL=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.max-lifetime=580000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.initialization-fail-timeout=-1

app.cors.allowed-origins=http://localhost:5173,https://bankleks.vercel.app

jwt.secret=${JWT_SECRET}
jwt.refresh-expiration-ms=${JWT_REFRESH_TIME}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.sql.init.mode=never